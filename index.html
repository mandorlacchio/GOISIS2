<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Contatore Goisis</title>
<style>
  * { box-sizing:border-box; }
  body {
    margin:0;
    padding:10px;
    background:#f4f4f4;
    color:#000;
    font-family:-apple-system, BlinkMacSystemFont, Arial, sans-serif;
  }
  h1 {
    font-size:24px;
    margin:4px 0 8px;
    text-align:center;
  }
  #totale {
    background:white;
    border-radius:12px;
    padding:10px;
    margin-bottom:8px;
    text-align:center;
    font-size:26px;
    font-weight:900;
    position:sticky;
    top:0;
    z-index:10;
    box-shadow:0 1px 5px #ccc;
  }
  .griglia {
    display:grid;
    grid-template-columns:1fr;
    gap:7px;
  }
  .scheda {
    background:white;
    border-radius:12px;
    padding:8px;
    box-shadow:0 1px 4px #ddd;
  }
  .nome {
    font-size:18px;
    font-weight:800;
    margin-bottom:6px;
    line-height:1.1;
  }
  .riga {
    display:grid;
    grid-template-columns:54px 1fr 54px;
    gap:7px;
    align-items:center;
  }
  button {
    border:0;
    border-radius:11px;
    font-size:28px;
    font-weight:900;
    height:48px;
    color:white;
    touch-action:manipulation;
  }
  .meno { background:#d63b35; }
  .piu { background:#168a3a; }
  .numero {
    font-size:26px;
    font-weight:900;
    text-align:center;
    line-height:48px;
    background:#f1f1f1;
    border-radius:10px;
  }
  .azioni {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px;
  }
  .azione {
    background:#222;
    font-size:19px;
    height:48px;
  }
  #report {
    display:none;
    white-space:pre-wrap;
    background:white;
    border-radius:12px;
    padding:10px;
    margin-top:8px;
    font-size:16px;
    line-height:1.3;
  }
  @media (min-width:650px) {
    .griglia { grid-template-columns:1fr 1fr; }
  }
</style>
</head>
<body>

<h1>Contatore Goisis</h1>
<div id="totale">Totale: € 0,00</div>

<div class="griglia">

  <div class="scheda" data-nome="Cono 1 gusto" data-prezzo="3" data-qta="0">
    <div class="nome">Cono 1 gusto</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Cono 2 gusti" data-prezzo="4" data-qta="0">
    <div class="nome">Cono 2 gusti</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Coppetta 1 gusto" data-prezzo="3" data-qta="0">
    <div class="nome">Coppetta 1 gusto</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Coppetta 2 gusti" data-prezzo="4" data-qta="0">
    <div class="nome">Coppetta 2 gusti</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Fruttino" data-prezzo="2.5" data-qta="0">
    <div class="nome">Fruttino</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Coppa brownies" data-prezzo="5" data-qta="0">
    <div class="nome">Coppa brownies</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Brioche gelato" data-prezzo="6" data-qta="0">
    <div class="nome">Brioche gelato</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Cheesecake" data-prezzo="5" data-qta="0">
    <div class="nome">Cheesecake</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

  <div class="scheda" data-nome="Tiramisù" data-prezzo="5" data-qta="0">
    <div class="nome">Tiramisù</div>
    <div class="riga">
      <button type="button" class="meno">−</button>
      <div class="numero">0</div>
      <button type="button" class="piu">+</button>
    </div>
  </div>

</div>

<div class="azioni">
  <button type="button" class="azione" id="btnReport">Report</button>
  <button type="button" class="azione" id="btnAzzera">Azzera</button>
</div>

<div id="report"></div>

<script>
(function(){
  function euro(n) {
    return "€ " + Number(n).toFixed(2).replace(".", ",");
  }

  function schede() {
    return Array.from(document.querySelectorAll(".scheda"));
  }

  function aggiorna() {
    let totale = 0;
    const salvataggio = [];

    schede().forEach(function(s) {
      const qta = Number(s.dataset.qta || 0);
      const prezzo = Number(s.dataset.prezzo || 0);
      s.querySelector(".numero").textContent = qta;
      totale += qta * prezzo;
      salvataggio.push({ nome:s.dataset.nome, qta:qta });
    });

    document.getElementById("totale").textContent = "Totale: " + euro(totale);
    try {
      localStorage.setItem("goisis_contatore_v3", JSON.stringify(salvataggio));
    } catch(e) {}
  }

  function carica() {
    try {
      const raw = localStorage.getItem("goisis_contatore_v3");
      if (!raw) return;
      const salvati = JSON.parse(raw);
      schede().forEach(function(s) {
        const trovato = salvati.find(function(x){ return x.nome === s.dataset.nome; });
        if (trovato) s.dataset.qta = trovato.qta;
      });
    } catch(e) {}
  }

  document.addEventListener("click", function(e) {
    const btn = e.target.closest("button");
    if (!btn) return;

    const scheda = btn.closest(".scheda");

    if (btn.classList.contains("piu") && scheda) {
      scheda.dataset.qta = Number(scheda.dataset.qta || 0) + 1;
      aggiorna();
      return;
    }

    if (btn.classList.contains("meno") && scheda) {
      scheda.dataset.qta = Math.max(0, Number(scheda.dataset.qta || 0) - 1);
      aggiorna();
      return;
    }

    if (btn.id === "btnReport") {
      generaReport();
      return;
    }

    if (btn.id === "btnAzzera") {
      if (confirm("Azzero tutta la serata?")) {
        schede().forEach(function(s){ s.dataset.qta = 0; });
        document.getElementById("report").style.display = "none";
        aggiorna();
      }
    }
  });

  function generaReport() {
    let totale = 0;
    let pezzi = 0;
    let testo = "REPORT GOISIS\n\n";

    schede().forEach(function(s) {
      const nome = s.dataset.nome;
      const qta = Number(s.dataset.qta || 0);
      const prezzo = Number(s.dataset.prezzo || 0);

      if (qta > 0) {
        testo += nome + ": " + qta + " = " + euro(qta * prezzo) + "\n";
      }

      totale += qta * prezzo;
      pezzi += qta;
    });

    testo += "\nTotale pezzi: " + pezzi;
    testo += "\nTotale incasso: " + euro(totale);

    const box = document.getElementById("report");
    box.textContent = testo;
    box.style.display = "block";
  }

  carica();
  aggiorna();
})();
</script>

</body>
</html>
